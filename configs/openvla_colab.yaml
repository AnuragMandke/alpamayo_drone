# OpenVLA smoke-test config for a FREE Colab/Kaggle T4 (16GB, Turing).
#
# Purpose: prove the *pretrained* transfer arm loads in 4-bit and trains a few
# steps on a T4 without OOM/dtype errors — burning down the "pending lab-GPU
# validation" blocker. This is NOT a result-producing run; see configs/openvla.yaml
# for the real ablation on the lab GPU.
#
#   python scripts/train_openvla.py --config configs/openvla_colab.yaml --init pretrained
#
# Key differences from configs/openvla.yaml:
#   - precision: fp16   T4/P100 have NO bf16 tensor cores. bf16 there errors or
#                       falls back to a slow emulation, so fp16 is mandatory.
#   (target_mode is now `waypoint`, same as the lab config — see below.)
#   - max_steps + tiny batch   quick feedback within the free-tier session limit.
#
# WHY NOT velocity: the 2026-07-16 smoke ran velocity and plateaued at 2.450 nats.
# A model that learned ONLY the marginal action distribution — nothing from the
# image — scores 2.576 on this data, so it had learned almost nothing conditional.
# That is inherent, not undertraining: instantaneous velocity is invisible in one
# static frame (see data/openvla_dataset.py:40-48). In velocity mode ALL THREE
# ablation arms converge to ~2.58 regardless of pretraining, i.e. a null result by
# construction. Waypoint is well-posed from a single frame AND matches OpenVLA's
# native action semantics (relative EEF translation).
#
# YARDSTICK: the trainer PRINTS the marginal-only floor at startup, computed from
# the train split (waypoint: 2.563). Meaningfully below it = the model is using the
# image; at/above it = it is not. Read every run against the printed number.
# NOTE the reported loss is diluted ~2x: it averages 8 supervised positions, but
# drone_to_openvla writes constant zeros into roll/pitch/gripper, so 3 of the 7
# action tokens + EOS are free to predict. Only dims [0,1,2,5] carry drone data.
# The offline eval should score those 4 dims only.
#
# The scratch/prismatic control arms need >=24GB bf16 and will NOT fit a T4 — run
# those on the lab GPU with configs/openvla.yaml.

model:
  load_in_4bit: true          # 4-bit QLoRA — the only arm that fits a 16GB T4
  lora:
    rank: 32
    alpha: 64
    dropout: 0.0

data:
  dataset_root: "data/uzh_fpv"
  train_split: 0.9
  predict_offset: 0
  num_workers: 2              # Colab CPUs are limited
  target_mode: waypoint      # matches the lab config; see header note
  waypoint_horizon: 8

training:
  output_dir: "outputs/openvla"
  seed: 42
  precision: fp16            # <-- T4-critical; bf16 has no HW support on Turing
  epochs: 1
  # 2026-07-16: raised 50 -> 600 (~50 min on a T4 at ~12 steps/min, 2400 samples,
  # still <1 epoch of 2938). 50 steps only proved the plumbing: both 50-step runs
  # sat at the marginal floor, which is what 200 samples buys either way, so they
  # could not answer whether the pipeline learns from pixels at all. THIS run can:
  # watch for the loss to break below the printed marginal floor (2.563).
  max_steps: 600
  batch_size: 4             # fits a T4 with the 4-bit base; raise if VRAM allows
  gradient_accumulation_steps: 1   # step == batch, for fast smoke feedback
  max_grad_norm: 1.0
  optimizer:
    lr: 5.0e-4
    weight_decay: 0.0
  save_every_n_epochs: 1
  log_every_n_steps: 20     # 30 log lines over 600 steps; a 20-batch window is
                            # also less noisy than 5 when reading for a trend
