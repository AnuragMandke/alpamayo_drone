# OpenVLA transfer pipeline config (runs in the OpenVLA env on the lab GPU).
# See requirements-openvla.txt. This is separate from configs/default.yaml,
# which drives the Qwen + FlowMatchingDecoder pipeline.

model:
  load_in_4bit: true          # 4-bit QLoRA for the pretrained arm (fits ~16GB)
  lora:
    rank: 32
    alpha: 64
    dropout: 0.0

data:
  dataset_root: "data/uzh_fpv"
  train_split: 0.9
  predict_offset: 0           # (velocity mode only) predict action at observed frame
  num_workers: 4

  # Target for the single observed frame:
  #   velocity  - instantaneous body-frame [vx,vy,vz,yaw_rate] from actions.npy.
  #               NOT recoverable from one RGB frame (motion is invisible in a
  #               single image) -> an ill-posed regression. Kept for comparison.
  #   waypoint  - body-frame displacement to the pose `waypoint_horizon` frames
  #               ahead [dx,dy,dz,dyaw] from poses.npy. Well-posed from a single
  #               frame AND matches OpenVLA's native relative-EEF action, so the
  #               pretrained prior transfers more directly. RECOMMENDED.
  #               Needs poses.npy -> re-run scripts/convert_uzh_fpv.py.
  target_mode: waypoint
  waypoint_horizon: 8         # frames. Measured 2026-07-16: median frame dt is
                              # 0.0339s (29.5Hz), so ~0.27s nominal — BUT UZH-FPV
                              # drops frames (dt p90 = 0.0657s, ~2x), so this is a
                              # VARIABLE time horizon: the worst observed 8-frame
                              # window spans 0.43s. poses.npy carries no timestamps
                              # to correct for it, so the target has an irreducible
                              # noise floor. It hits all three arms equally, so the
                              # ablation comparison stays valid — but it caps how
                              # low any arm's loss can go. Fixing it needs the
                              # converter to emit per-frame timestamps.

training:
  output_dir: "outputs/openvla"
  seed: 42
  epochs: 5                   # OpenVLA finetunes converge fast; tune on lab GPU
  batch_size: 8               # per-step; raise on a 24-40GB GPU. NOTE: the
                              # scratch arm keeps a bf16 (~14GB) base vs the
                              # pretrained arm's 4-bit base, so it needs >=24GB
                              # or a smaller batch_size than the pretrained run.
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  optimizer:
    lr: 5.0e-4                # OpenVLA LoRA finetuning default
    weight_decay: 0.0
  bf16: true
  save_every_n_epochs: 1
  log_every_n_steps: 20
